name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock', 'core/package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build and test
        run: stack test --no-terminal
